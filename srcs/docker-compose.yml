services:
  nginx:
    build:
      dockerfile: ./requirements/nginx/Dockerfile
    container_name: nginx
    env_file:
      - ./.env
    volumes:
      - wordpress:/var/www/html/wordpress
    ports:
      - "${NGINX_PORT}:${NGINX_PORT}"
    networks:
      - web
    depends_on:
      - wordpress
    restart: always
  wordpress:
    build:
      dockerfile: ./requirements/wordpress/Dockerfile
    container_name: wordpress
    env_file:
      - ./.env
    volumes:
      - wordpress:/var/www/html/wordpress
    networks:
      - web
    expose:
      - "${WP_PORT}"
    depends_on:
      - mariadb
    restart: always
  mariadb:
    build:
      dockerfile: ./requirements/mariadb/Dockerfile
    container_name: mariadb
    volumes:
      - mariadb:/var/lib/mysql
    networks:
      - web
    env_file:
      - ./.env
    expose:
      - "${DB_PORT}"
    restart: always
networks:
  web:
volumes:
  wordpress:
    name: wordpress
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: '/home/${USER}/data/wordpress'
  mariadb:
    name: mariadb
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: '/home/${USER}/data/mariadb'
